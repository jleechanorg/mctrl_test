# Mission Control Stack
# Local development via Docker Compose.
# See: https://github.com/openclaw/openclaw-mission-control
#
# Start: docker compose up -d
# Logs: docker compose logs -f
# Stop: docker compose down

services:
  db:
    image: postgres:16-alpine
    container_name: mc-db
    environment:
      POSTGRES_USER: ${DB_USER:-openclaw}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-openclaw}
      POSTGRES_DB: ${DB_NAME:-openclaw}
    ports:
      - "5432:5432"
    volumes:
      - mc-db-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-openclaw}"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: mc-redis
    ports:
      - "6379:6379"
    volumes:
      - mc-redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    image: openclawmissioncontrol/backend:latest
    container_name: mc-backend
    env_file:
      - .env
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped

  webhook-worker:
    image: openclawmissioncontrol/webhook-worker:latest
    container_name: mc-webhook-worker
    env_file:
      - .env
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped

volumes:
  mc-db-data:
  mc-redis-data:
