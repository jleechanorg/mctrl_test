name: Skeptic Gate

# Portable install (scripts/gates/install-gates.sh): deterministic 6-green check.
# No LLM in GHA. Gate 1 uses repo variable SKEPTIC_REQUIRED_CHECK_NAMES (comma-separated
# check-run names, default: test). Set SKEPTIC_REQUIRE_CODERABBIT=false to skip Gate 3 when
# CodeRabbit is not installed.
#
# Upstream reference: jleechanorg/agent-orchestrator .github/workflows/skeptic-gate.yml
on:
  pull_request:
    types: [opened, synchronize, edited, reopened]
  workflow_dispatch:
    inputs:
      pr_number:
        description: "PR number"
        required: true
        type: string
      head_sha:
        description: "PR head commit SHA"
        required: true
        type: string

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false  # Never cancel in-progress gate runs; multiple runs for same SHA are harmless

jobs:
  skeptic_gate:
    name: Skeptic Gate
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
      issues: write
      contents: read
      checks: write
    steps:
      - name: Run 6-green gate checks
        id: gates
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUM: ${{ github.event.inputs.pr_number || github.event.pull_request.number }}
          HEAD_SHA: ${{ github.event.inputs.head_sha || github.event.pull_request.head.sha }}
        run: |
          set +e
          PR_NUM=$PR_NUM
          FAILED_GATES=""
          GATE_ROWS=""

          # Resolve HEAD_SHA if not provided (workflow_dispatch may have stale value)
          if [ -z "$HEAD_SHA" ]; then
            HEAD_SHA=$(gh api repos/${{ github.repository }}/pulls/"$PR_NUM" --jq '.head.sha' 2>/dev/null || echo "")
          fi
          if [ -z "$HEAD_SHA" ]; then
            echo "ERROR: could not determine HEAD SHA for PR #$PR_NUM"
            exit 1
          fi
          echo "Checking PR #$PR_NUM at SHA ${HEAD_SHA:0:12}"

          # ----------------------------------------------------------------
          # Gate 1: CI green — required check runs (repo-configurable).
          #
          # Repository variable SKEPTIC_REQUIRED_CHECK_NAMES: comma-separated GitHub
          # Actions check-run names (default when unset: test). Example monorepo:
          #   Lint,Typecheck,Test
          # ----------------------------------------------------------------

          RAW_NAMES="${{ vars.SKEPTIC_REQUIRED_CHECK_NAMES }}"
          if [ -z "$RAW_NAMES" ]; then RAW_NAMES="test"; fi
          NAMES_JSON=$(printf '%s' "$RAW_NAMES" | jq -R -c 'gsub("^\\s+|\\s+$";"") | split(",") | map(gsub("^\\s+|\\s+$";"")) | map(select(length>0))')
          REQ_COUNT=$(echo "$NAMES_JSON" | jq 'length')
          if [ "$REQ_COUNT" -eq 0 ]; then NAMES_JSON='["test"]'; REQ_COUNT=1; fi

          echo "Waiting for required CI checks: $NAMES_JSON"
          MAX_WAIT=300
          INTERVAL=30
          ELAPSED=0
          while [ $ELAPSED -lt $MAX_WAIT ]; do
            if [ $ELAPSED -eq 0 ]; then
              sleep 10
              ELAPSED=10
            else
              sleep $INTERVAL
              ELAPSED=$((ELAPSED + INTERVAL))
            fi

            CHECK_RUNS_FAILED=0
            CHECK_RUNS_PENDING=0
            TOTAL_CHECKS=0
            CR_JSON=$(gh api "repos/${{ github.repository }}/commits/$HEAD_SHA/check-runs?per_page=100" 2>/dev/null) || CR_JSON=""
            i=0
            while [ $i -lt "$REQ_COUNT" ]; do
              NM=$(echo "$NAMES_JSON" | jq -r ".[$i]")
              # gh --jq --arg is unreliable in GHA; pipe raw JSON to jq.
              if [ -z "$CR_JSON" ]; then
                CHECK_RUNS_PENDING=$((CHECK_RUNS_PENDING+1))
              else
                CONC=$(printf '%s' "$CR_JSON" | jq -r --arg n "$NM" \
                  '[.check_runs[]? | select(.name == $n and .status == "completed")] | sort_by(.completed_at) | reverse | .[0].conclusion // "missing"' 2>/dev/null || echo "__jq_error__")
                if [ "$CONC" = "__jq_error__" ]; then
                  CHECK_RUNS_PENDING=$((CHECK_RUNS_PENDING+1))
                elif [ "$CONC" != "missing" ]; then
                  if [ "$CONC" = "success" ] || [ "$CONC" = "skipped" ] || [ "$CONC" = "neutral" ] || [ "$CONC" = "cancelled" ]; then
                    TOTAL_CHECKS=$((TOTAL_CHECKS+1))
                  else
                    CHECK_RUNS_FAILED=$((CHECK_RUNS_FAILED+1))
                  fi
                else
                  INFLIGHT=$(printf '%s' "$CR_JSON" | jq -r --arg n "$NM" '[.check_runs[]? | select(.name == $n and .status != "completed")] | length' 2>/dev/null || echo "0")
                  ANY=$(printf '%s' "$CR_JSON" | jq -r --arg n "$NM" '[.check_runs[]? | select(.name == $n)] | length' 2>/dev/null || echo "0")
                  if [ "${INFLIGHT:-0}" -gt 0 ] || [ "${ANY:-0}" -eq 0 ]; then
                    CHECK_RUNS_PENDING=$((CHECK_RUNS_PENDING+1))
                  else
                    CHECK_RUNS_FAILED=$((CHECK_RUNS_FAILED+1))
                  fi
                fi
              fi
              i=$((i+1))
            done

            echo "  [${ELAPSED}s] matched=${TOTAL_CHECKS}/${REQ_COUNT}, pending=${CHECK_RUNS_PENDING}, failed=${CHECK_RUNS_FAILED}"

            if [ "$CHECK_RUNS_PENDING" -eq 0 ] && [ "$CHECK_RUNS_FAILED" -eq 0 ] && [ "$TOTAL_CHECKS" -eq "$REQ_COUNT" ]; then
              echo "Required CI checks completed after ${ELAPSED}s"
              break
            fi
          done

          if [ $ELAPSED -ge $MAX_WAIT ]; then
            echo "TIMEOUT: required CI checks not ready after ${MAX_WAIT}s"
          fi

          CHECK_RUNS_FAILED=0
          CHECK_RUNS_PENDING=0
          TOTAL_CHECKS=0
          CR_JSON=$(gh api "repos/${{ github.repository }}/commits/$HEAD_SHA/check-runs?per_page=100" 2>/dev/null) || CR_JSON=""
          i=0
          while [ $i -lt "$REQ_COUNT" ]; do
            NM=$(echo "$NAMES_JSON" | jq -r ".[$i]")
            if [ -z "$CR_JSON" ]; then
              CHECK_RUNS_PENDING=$((CHECK_RUNS_PENDING+1))
            else
              CONC=$(printf '%s' "$CR_JSON" | jq -r --arg n "$NM" \
                '[.check_runs[]? | select(.name == $n and .status == "completed")] | sort_by(.completed_at) | reverse | .[0].conclusion // "missing"' 2>/dev/null || echo "__jq_error__")
              if [ "$CONC" = "__jq_error__" ]; then
                CHECK_RUNS_PENDING=$((CHECK_RUNS_PENDING+1))
              elif [ "$CONC" != "missing" ]; then
                if [ "$CONC" = "success" ] || [ "$CONC" = "skipped" ] || [ "$CONC" = "neutral" ] || [ "$CONC" = "cancelled" ]; then
                  TOTAL_CHECKS=$((TOTAL_CHECKS+1))
                else
                  CHECK_RUNS_FAILED=$((CHECK_RUNS_FAILED+1))
                fi
              else
                INFLIGHT=$(printf '%s' "$CR_JSON" | jq -r --arg n "$NM" '[.check_runs[]? | select(.name == $n and .status != "completed")] | length' 2>/dev/null || echo "0")
                ANY=$(printf '%s' "$CR_JSON" | jq -r --arg n "$NM" '[.check_runs[]? | select(.name == $n)] | length' 2>/dev/null || echo "0")
                if [ "${INFLIGHT:-0}" -gt 0 ] || [ "${ANY:-0}" -eq 0 ]; then
                  CHECK_RUNS_PENDING=$((CHECK_RUNS_PENDING+1))
                else
                  CHECK_RUNS_FAILED=$((CHECK_RUNS_FAILED+1))
                fi
              fi
            fi
            i=$((i+1))
          done

          CI_STATUS_JSON=$(gh api repos/${{ github.repository }}/commits/"$HEAD_SHA"/status \
            --jq '{state: .state, total: .total_count}' 2>/dev/null || echo '{"state":"error","total":0}')
          CI_STATUS=$(echo "$CI_STATUS_JSON" | jq -r '.state')

          CI_DETAIL="commit-status=$CI_STATUS, required=${REQ_COUNT}, ok=${TOTAL_CHECKS}, pending=${CHECK_RUNS_PENDING}, failed=${CHECK_RUNS_FAILED}, names=$(echo "$NAMES_JSON" | jq -c .)"

          if [ "${CHECK_RUNS_FAILED:-0}" -gt 0 ]; then
            GATE1="FAIL"
            FAILED_GATES="${FAILED_GATES}1, "
          elif [ "${CHECK_RUNS_PENDING:-0}" -eq 0 ] && [ "${TOTAL_CHECKS:-0}" -eq "$REQ_COUNT" ]; then
            GATE1="PASS"
          else
            GATE1="FAIL"
            FAILED_GATES="${FAILED_GATES}1, "
            CI_DETAIL="${CI_DETAIL} (timeout or missing check runs)"
          fi
          echo "Gate 1: $GATE1 ($CI_DETAIL)"
          GATE_ROWS="${GATE_ROWS}| 1. CI green | ${GATE1} | ${CI_DETAIL} |\n"

          # ----------------------------------------------------------------
          # Gate 2: No merge conflicts
          # ----------------------------------------------------------------
          PR_META=$(gh api repos/${{ github.repository }}/pulls/"$PR_NUM" \
            --jq '{mergeable: .mergeable, mergeable_state: .mergeable_state, merged: .merged}' 2>/dev/null)
          MERGEABLE=$(echo "$PR_META" | jq -r '.mergeable // "unknown"')
          MERGED_FLAG=$(echo "$PR_META" | jq -r '.merged // false')
          MERGEABLE_STATE=$(echo "$PR_META" | jq -r '.mergeable_state // "unknown"')

          if [ "$MERGED_FLAG" = "true" ]; then
            GATE2="PASS"
            GATE2_DETAIL="already merged"
          elif [ "$MERGEABLE" = "true" ]; then
            GATE2="PASS"
            GATE2_DETAIL="mergeable=$MERGEABLE, state=$MERGEABLE_STATE"
          else
            GATE2="FAIL"
            GATE2_DETAIL="mergeable=$MERGEABLE, state=$MERGEABLE_STATE"
            FAILED_GATES="${FAILED_GATES}2, "
          fi
          echo "Gate 2: $GATE2 ($GATE2_DETAIL)"
          GATE_ROWS="${GATE_ROWS}| 2. No conflicts | ${GATE2} | ${GATE2_DETAIL} |\n"

          # ----------------------------------------------------------------
          # Gate 3: CR APPROVED (latest CR review is APPROVED)
          # Set repository variable SKEPTIC_REQUIRE_CODERABBIT=false to skip when
          # CodeRabbit is not installed on the target repo.
          # ----------------------------------------------------------------
          REQUIRE_CR="${{ vars.SKEPTIC_REQUIRE_CODERABBIT }}"
          if [ "$REQUIRE_CR" = "false" ]; then
            GATE3="PASS"
            GATE3_DETAIL="skipped (SKEPTIC_REQUIRE_CODERABBIT=false)"
            LATEST_CR="skipped"
          else
            LATEST_CR=$(gh api repos/${{ github.repository }}/pulls/"$PR_NUM"/reviews \
              --jq '[.[] | select(.user.login == "coderabbitai[bot]" and (.state == "APPROVED" or .state == "CHANGES_REQUESTED"))] | sort_by(.submitted_at) | last | .state // "none"' \
              2>/dev/null || echo "none")
            LATEST_CR="${LATEST_CR:-none}"

            if [ "$LATEST_CR" = "APPROVED" ]; then
              GATE3="PASS"
            else
              GATE3="FAIL"
              FAILED_GATES="${FAILED_GATES}3, "
            fi
            GATE3_DETAIL="state=$LATEST_CR"
          fi
          echo "Gate 3: $GATE3 ($GATE3_DETAIL)"
          GATE_ROWS="${GATE_ROWS}| 3. CR approved | ${GATE3} | ${GATE3_DETAIL} |\n"

          # ----------------------------------------------------------------
          # Gate 4: Bugbot clean — use Cursor Bugbot check-run conclusion.
          # The check-run API is authoritative; text-scanning PR comments
          # for "error" produces false positives (review comments about
          # error handling match the pattern).
          # ----------------------------------------------------------------
          CR_BUG=$(gh api "repos/${{ github.repository }}/commits/$HEAD_SHA/check-runs?per_page=100" 2>/dev/null) || CR_BUG=""
          BUGBOT_CONCLUSION=$(printf '%s' "$CR_BUG" | jq -r '[.check_runs[]? | select(.name == "Cursor Bugbot")] | sort_by(.started_at) | reverse | .[0].conclusion // "none"' 2>/dev/null || echo "none")

          if [ "$BUGBOT_CONCLUSION" = "failure" ]; then
            GATE4="FAIL"
            FAILED_GATES="${FAILED_GATES}4, "
          else
            GATE4="PASS"
          fi
          GATE4_DETAIL="check-run=$BUGBOT_CONCLUSION"
          echo "Gate 4: $GATE4 ($GATE4_DETAIL)"
          GATE_ROWS="${GATE_ROWS}| 4. Bugbot clean | ${GATE4} | ${GATE4_DETAIL} |\n"

          # ----------------------------------------------------------------
          # Gate 5: Inline comments resolved (GraphQL — REST lacks isResolved)
          # Set SKEPTIC_REQUIRE_INLINE_THREADS_RESOLVED=false to skip (e.g. noisy bot threads).
          # ----------------------------------------------------------------
          REQUIRE_INLINE_THREADS="${{ vars.SKEPTIC_REQUIRE_INLINE_THREADS_RESOLVED }}"
          if [ "$REQUIRE_INLINE_THREADS" = "false" ]; then
            GATE5="PASS"
            GATE5_DETAIL="skipped (SKEPTIC_REQUIRE_INLINE_THREADS_RESOLVED=false)"
          else
          PR_AUTHOR=$(gh api repos/${{ github.repository }}/pulls/"$PR_NUM" --jq '.user.login' 2>/dev/null || echo "")
          REPO_NAME="${GITHUB_REPOSITORY#*/}"
          GQL_RESULT=$(gh api graphql -f query='
            query($owner: String!, $name: String!, $number: Int!) {
              repository(owner: $owner, name: $name) {
                pullRequest(number: $number) {
                  reviewThreads(first: 100) {
                    pageInfo { hasNextPage }
                    nodes {
                      isResolved
                      comments(first: 50) {
                        pageInfo { hasNextPage }
                        nodes { author { login } body }
                      }
                    }
                  }
                }
              }
            }
          ' -f owner='${{ github.repository_owner }}' -f name="$REPO_NAME" -F number="$PR_NUM" 2>/dev/null)

          if [ -z "$GQL_RESULT" ]; then
            UNRESOLVED="__GQL_ERROR__"
          elif [ "$(echo "$GQL_RESULT" | jq -r '.data.repository.pullRequest.reviewThreads.pageInfo.hasNextPage')" = "true" ] || \
               [ "$(echo "$GQL_RESULT" | jq -r '[.data.repository.pullRequest.reviewThreads.nodes[].comments.pageInfo.hasNextPage | select(. == true)] | length')" -gt 0 ]; then
            UNRESOLVED="__TRUNCATED__"
          else
            UNRESOLVED=$(echo "$GQL_RESULT" | jq -r "[.data.repository.pullRequest.reviewThreads.nodes[] | select(.isResolved == false) | .comments.nodes[] | select(.author.login != null and (.author.login | ascii_downcase) != (\"$PR_AUTHOR\" | ascii_downcase) and (.body | test(\"^\\\\s*(nit:|nitpick)\"; \"i\") | not))] | length")
          fi

          # Gate 5: Inline comments resolved
          # If CR has APPROVED, non-nit unresolved comments are non-blocking (CR
          # has already signed off despite the noise). Without CR APPROVED, unresolved
          # comments remain a hard failure (fail-closed).
          # When Gate 3 is skipped (no CodeRabbit), unresolved review threads still block.
          if [ "$LATEST_CR" = "APPROVED" ]; then
            GATE5="PASS"
            GATE5_DETAIL="${UNRESOLVED:-N/A} unresolved (CR approved — non-blocking)"
          elif [ "$LATEST_CR" = "skipped" ]; then
            if [ "$UNRESOLVED" = "__GQL_ERROR__" ] || [ "$UNRESOLVED" = "__TRUNCATED__" ]; then
              GATE5="FAIL"
              GATE5_DETAIL="$UNRESOLVED (fail-closed)"
              FAILED_GATES="${FAILED_GATES}5, "
            elif [ "${UNRESOLVED:-0}" -gt 0 ]; then
              GATE5="FAIL"
              GATE5_DETAIL="${UNRESOLVED} unresolved"
              FAILED_GATES="${FAILED_GATES}5, "
            else
              GATE5="PASS"
              GATE5_DETAIL="all resolved (CodeRabbit gate skipped)"
            fi
          elif [ "$UNRESOLVED" = "__GQL_ERROR__" ] || [ "$UNRESOLVED" = "__TRUNCATED__" ]; then
            GATE5="FAIL"
            GATE5_DETAIL="$UNRESOLVED (fail-closed)"
            FAILED_GATES="${FAILED_GATES}5, "
          elif [ "${UNRESOLVED:-0}" -gt 0 ]; then
            GATE5="FAIL"
            GATE5_DETAIL="${UNRESOLVED} unresolved"
            FAILED_GATES="${FAILED_GATES}5, "
          else
            GATE5="PASS"
            GATE5_DETAIL="all resolved"
          fi
          fi
          echo "Gate 5: $GATE5 ($GATE5_DETAIL)"
          GATE_ROWS="${GATE_ROWS}| 5. Comments resolved | ${GATE5} | ${GATE5_DETAIL} |\n"

          # ----------------------------------------------------------------
          # Gate 6: Evidence format check — advisory (WARN, not FAIL).
          #
          # Checks the Evidence section of the PR body for:
          # - Markdown image with HTTPS URL ( ![alt](https://...) )
          # - Code block ( ``` )
          # - Structured output reference (**Test output** or **Terminal output**)
          # - Fabricated/placeholder patterns (rejects: simulated, example.com,
          #   <screenshot path>, <value>, TODO, TBD)
          #
          # This is advisory (WARN) because the LLM skeptic path covers evidence
          # authenticity; Gate 6 is a fast deterministic supplement only.
          # ----------------------------------------------------------------
          PR_BODY_GATE6=$(gh api repos/${{ github.repository }}/pulls/"$PR_NUM" --jq '.body // ""' 2>/dev/null || echo "")

          GATE6_DETAIL="no_evidence_section"
          if [ -n "$PR_BODY_GATE6" ]; then
            # Extract Evidence section: from "## Evidence" to next ## heading
            # Strip HTML comment lines (<!-- ... -->) before scanning
            EVIDENCE_GATE6=$(printf '%s\n' "$PR_BODY_GATE6" | awk '
              BEGIN { IGNORECASE=1; in_section=0; in_comment=0 }
              /<!--.*-->/ { next }
              in_comment && /^[[:space:]]*-->/ { in_comment=0; next }
              /^[[:space:]]*<!--/ { in_comment=1; next }
              in_comment { next }
              /^[[:space:]]*##[[:space:]]+evidence([[:space:]]|$)/ { in_section=1; next }
              in_section && /^[[:space:]]*##[[:space:]]/ { exit }
              in_section { print }
            ' 2>/dev/null || true)

            if [ -n "$EVIDENCE_GATE6" ]; then
              # Reject fabricated/placeholder patterns (fail-closed on fabrication)
              if printf '%s' "$EVIDENCE_GATE6" | grep -qiE '\bsimulated\b'; then
                GATE6="FAIL"
                GATE6_DETAIL="fabricated_content_detected"
              elif printf '%s' "$EVIDENCE_GATE6" | grep -qiE 'https?://(www\.)?example\.com'; then
                GATE6="FAIL"
                GATE6_DETAIL="placeholder_url_detected"
              elif printf '%s' "$EVIDENCE_GATE6" | grep -qiE '<screenshot[[:space:]]path>|<value>|\bTODO\b|\bTBD\b'; then
                GATE6="FAIL"
                GATE6_DETAIL="placeholder_template_detected"
              # Require real media (image with HTTPS, code block, or structured output)
              elif printf '%s' "$EVIDENCE_GATE6" | grep -qiE '!\[[^]]*\]\(https://[^)]+\)'; then
                GATE6="WARN"
                GATE6_DETAIL="image_found_(advisory)"
              elif printf '%s' "$EVIDENCE_GATE6" | grep -qiE '\*\*(Test|Terminal)\s*output\*\*:[[:space:]]+\S'; then
                GATE6="WARN"
                GATE6_DETAIL="structured_output_found_(advisory)"
              elif printf '%s' "$EVIDENCE_GATE6" | grep -q '```'; then
                GATE6="WARN"
                GATE6_DETAIL="code_block_found_(advisory)"
              else
                GATE6="WARN"
                GATE6_DETAIL="evidence_section_present_(no_media_detected)"
              fi
            else
              GATE6="WARN"
              GATE6_DETAIL="empty_evidence_section"
            fi
          else
            GATE6="WARN"
            GATE6_DETAIL="no_pr_body"
          fi

          # Gate 6 is advisory only — never adds to FAILED_GATES
          echo "Gate 6: $GATE6 ($GATE6_DETAIL)"
          GATE_ROWS="${GATE_ROWS}| 6. Evidence format | ${GATE6} | ${GATE6_DETAIL} |\n"

          # ----------------------------------------------------------------
          # Build result
          # ----------------------------------------------------------------
          # Trim trailing ", " from FAILED_GATES
          FAILED_GATES=$(echo "$FAILED_GATES" | sed 's/, $//')

          if [ -z "$FAILED_GATES" ]; then
            OVERALL="PASS"
            RESULT_LINE="**Result: PASS** — all gates green"
          else
            OVERALL="FAIL"
            RESULT_LINE="**Result: FAIL** — gates ${FAILED_GATES} failed"
          fi

          echo "overall=$OVERALL" >> "$GITHUB_OUTPUT"
          echo "head_sha=$HEAD_SHA" >> "$GITHUB_OUTPUT"

          # Build the comment body
          COMMENT_BODY="## Skeptic Gate — Deterministic 6-Green Check

          | Gate | Result | Detail |
          |------|--------|--------|
          $(printf '%s' "$GATE_ROWS")

          ${RESULT_LINE}

          VERDICT: ${OVERALL}
          <!-- skeptic-gate-result-${HEAD_SHA} -->"

          # Remove leading whitespace from heredoc-style indentation
          COMMENT_BODY=$(echo "$COMMENT_BODY" | sed 's/^          //')

          echo "comment_body<<COMMENT_EOF" >> "$GITHUB_OUTPUT"
          echo "$COMMENT_BODY" >> "$GITHUB_OUTPUT"
          echo "COMMENT_EOF" >> "$GITHUB_OUTPUT"

      - name: Post gate results comment
        if: always()
        continue-on-error: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUM: ${{ github.event.inputs.pr_number || github.event.pull_request.number }}
          HEAD_SHA: ${{ steps.gates.outputs.head_sha }}
          COMMENT_BODY: ${{ steps.gates.outputs.comment_body }}
        run: |
          # Delete previous skeptic-gate-result comments to avoid clutter
          PREV_COMMENTS=$(gh api repos/${{ github.repository }}/issues/"$PR_NUM"/comments \
            --paginate \
            --jq '[.[] | select(.user.login == "github-actions[bot]" and (.body | test("skeptic-gate-result-"))) | .id]' 2>/dev/null || echo "[]")

          for CID in $(echo "$PREV_COMMENTS" | jq -r '.[]' 2>/dev/null); do
            gh api repos/${{ github.repository }}/issues/comments/"$CID" --method DELETE 2>/dev/null || true
          done

          # Post the new comment
          gh api repos/${{ github.repository }}/issues/"$PR_NUM"/comments \
            --field body="$COMMENT_BODY" \
            --jq '.id' > /dev/null 2>&1
          echo "Posted gate results comment on PR #$PR_NUM"

      - name: Set check result
        if: always()
        env:
          OVERALL: ${{ steps.gates.outputs.overall }}
        run: |
          if [ "$OVERALL" = "PASS" ]; then
            echo "Skeptic Gate: PASS"
            exit 0
          else
            echo "Skeptic Gate: FAIL"
            exit 1
          fi
