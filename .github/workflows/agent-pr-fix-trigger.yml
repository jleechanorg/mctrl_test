name: Agent PR Fix Trigger

on:
  issue_comment:
    types: [created]

jobs:
  trigger-agent:
    if: |
      github.event.issue.pull_request &&
      (
        contains(github.event.comment.body, '@jleechanclaw') ||
        contains(github.event.comment.body, '<@U0AEZC7RX1Q>')
      ) &&
      contains(fromJSON('["OWNER", "MEMBER", "COLLABORATOR"]'), github.event.comment.author_association)
    permissions: {}
    runs-on: self-hosted
    steps:
      - name: Create Mission Control task
        env:
          MC_BASE_URL: ${{ vars.MISSION_CONTROL_BASE_URL }}
          MC_TOKEN: ${{ secrets.MISSION_CONTROL_TOKEN }}
          MC_BOARD_ID: ${{ vars.MISSION_CONTROL_BOARD_ID }}
          COMMENT_BODY: ${{ github.event.comment.body }}
          PR_NUMBER: ${{ github.event.issue.number }}
          REPO: ${{ github.repository }}
          COMMENT_URL: ${{ github.event.comment.html_url }}
          ACTOR: ${{ github.actor }}
        run: |
          set -euo pipefail

          if [[ -z "${MC_BASE_URL:-}" || -z "${MC_TOKEN:-}" || -z "${MC_BOARD_ID:-}" ]]; then
            echo "Mission Control configuration is incomplete" >&2
            exit 1
          fi

          if ! grep -Eiq '@jleechanclaw|<@U0AEZC7RX1Q>' <<< "$COMMENT_BODY"; then
            echo "No trigger mention found; skipping."
            exit 0
          fi

          # Remove trigger mention(s) while preserving surrounding text safely.
          INSTRUCTION="$(jq -rn --arg body "$COMMENT_BODY" '$body | gsub("(?i)@jleechanclaw|<@U0AEZC7RX1Q>"; "") | gsub("^\\s+|\\s+$"; "")')"

          PAYLOAD="$(jq -n \
            --arg title "PR Fix: $REPO #$PR_NUMBER" \
            --arg description "$INSTRUCTION" \
            '{
              title: $title,
              description: $description
            }')"

          curl --silent --show-error --fail-with-body \
            -X POST "$MC_BASE_URL/api/v1/boards/$MC_BOARD_ID/tasks" \
            -H "Authorization: Bearer $MC_TOKEN" \
            -H "Content-Type: application/json" \
            -d "$PAYLOAD"

          echo "Task created for PR #$PR_NUMBER"
