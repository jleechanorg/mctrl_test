name: CI

on:
  push:
    branches:
      - main
      - feat/minimal-python-ci
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Check out code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install test dependency
        run: python -m pip install --upgrade pip pytest

      - name: Run tests
        run: python -m pytest
