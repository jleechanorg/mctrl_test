# Agent PR Fix Trigger
#
# Webhook-first GitHub event integration for the OpenClaw autonomous
# delivery pipeline. Fires on PR comments that mention @jleechanclaw and
# on PR review submissions.
#
# Security model:
# - Trusted-actor gate: only OWNER, MEMBER, or COLLABORATOR can trigger.
# - PR-only filter: issue comments without a pull_request link are ignored.
# - Payload built via jq to prevent JSON injection.
# - curl --fail-with-body: non-2xx responses fail the step (no silent errors).
#
# Fallback: when MISSION_CONTROL_BASE_URL / MISSION_CONTROL_TOKEN are not
# set, the workflow logs a notice and exits cleanly. The polling path
# (task_poller.py) remains the primary integration in that case.
#
# Runs on: GitHub-hosted runners (no self-hosted setup required).

name: Agent PR Trigger

on:
  issue_comment:
    types: [created]
  pull_request_review:
    types: [submitted]

jobs:
  trigger-agent:
    name: Create Mission Control task
    runs-on: ubuntu-latest

    # -----------------------------------------------------------------------
    # Trusted-actor gate (issue_comment)
    # -----------------------------------------------------------------------
    # For pull_request_review we intentionally accept all submitted reviews:
    # creating reviews already requires repository-granted review permissions,
    # and we treat each review submission as actionable pipeline input.
    if: |
      (
        github.event_name == 'issue_comment' &&
        github.event.issue.pull_request != null &&
        contains(github.event.comment.body, '@jleechanclaw') &&
        contains(fromJSON('["OWNER", "MEMBER", "COLLABORATOR"]'), github.event.comment.author_association)
      ) || (
        github.event_name == 'pull_request_review'
      )

    steps:
      - name: Check Mission Control configuration
        id: check-config
        env:
          MC_BASE_URL: ${{ vars.MISSION_CONTROL_BASE_URL }}
          MC_TOKEN: ${{ secrets.MISSION_CONTROL_TOKEN }}
          MC_BOARD_ID: ${{ vars.MISSION_CONTROL_BOARD_ID }}
        run: |
          if [ -z "$MC_BASE_URL" ] || [ -z "$MC_TOKEN" ] || [ -z "$MC_BOARD_ID" ]; then
            echo "::notice::MISSION_CONTROL_BASE_URL, MISSION_CONTROL_TOKEN, or MISSION_CONTROL_BOARD_ID not configured."
            echo "::notice::Polling path (task_poller.py) remains active. No task created."
            echo "configured=false" >> "$GITHUB_OUTPUT"
          else
            echo "configured=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Create Mission Control task (issue_comment)
        if: |
          steps.check-config.outputs.configured == 'true' &&
          github.event_name == 'issue_comment'
        env:
          MC_BASE_URL: ${{ vars.MISSION_CONTROL_BASE_URL }}
          MC_TOKEN: ${{ secrets.MISSION_CONTROL_TOKEN }}
          MC_BOARD_ID: ${{ vars.MISSION_CONTROL_BOARD_ID }}
          COMMENT_BODY: ${{ github.event.comment.body }}
          PR_NUMBER: ${{ github.event.issue.number }}
          REPO: ${{ github.repository }}
          COMMENT_URL: ${{ github.event.comment.html_url }}
          SOURCE_EVENT_ID: ${{ github.event.comment.id }}
          ACTOR: ${{ github.actor }}
        run: |
          # Extract instruction after mention (safe: no xargs, no shell interpolation)
          INSTRUCTION=$(echo "$COMMENT_BODY" | sed 's/@jleechanclaw//')

          # Build payload via jq (prevents JSON injection and whitespace mangling)
          PAYLOAD=$(jq -n \
            --arg title "PR Fix: $REPO #$PR_NUMBER" \
            --arg description "$INSTRUCTION" \
            --arg board_id "$MC_BOARD_ID" \
            --argjson pr_number "$PR_NUMBER" \
            --arg repo "$REPO" \
            --arg comment_url "$COMMENT_URL" \
            --arg source_event_id "$SOURCE_EVENT_ID" \
            --arg actor "$ACTOR" \
            --arg trigger_event "issue_comment" \
            '{
              title: $title,
              description: $description,
              board_id: $board_id,
              status: "inbox",
              metadata: {
                trigger_event: $trigger_event,
                pr_number: $pr_number,
                repo: $repo,
                comment_url: $comment_url,
                source_event_id: $source_event_id,
                actor: $actor
              }
            }')

          # Fail-fast: --fail-with-body ensures non-2xx fails the step
          curl --fail-with-body --connect-timeout 10 --max-time 30 -X POST "$MC_BASE_URL/api/v1/boards/$MC_BOARD_ID/tasks" \
            -H "Authorization: Bearer $MC_TOKEN" \
            -H "Content-Type: application/json" \
            -d "$PAYLOAD"

          echo "Task created for PR #$PR_NUMBER (issue_comment trigger)"

      - name: Create Mission Control task (pull_request_review)
        if: |
          steps.check-config.outputs.configured == 'true' &&
          github.event_name == 'pull_request_review'
        env:
          MC_BASE_URL: ${{ vars.MISSION_CONTROL_BASE_URL }}
          MC_TOKEN: ${{ secrets.MISSION_CONTROL_TOKEN }}
          MC_BOARD_ID: ${{ vars.MISSION_CONTROL_BOARD_ID }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          PR_TITLE: ${{ github.event.pull_request.title }}
          REPO: ${{ github.repository }}
          REVIEW_URL: ${{ github.event.review.html_url }}
          REVIEW_STATE: ${{ github.event.review.state }}
          SOURCE_EVENT_ID: ${{ github.event.review.id }}
          ACTOR: ${{ github.actor }}
        run: |
          PAYLOAD=$(jq -n \
            --arg title "Review: $PR_TITLE (#$PR_NUMBER)" \
            --arg description "Review submitted: $REVIEW_STATE" \
            --arg board_id "$MC_BOARD_ID" \
            --argjson pr_number "$PR_NUMBER" \
            --arg repo "$REPO" \
            --arg review_url "$REVIEW_URL" \
            --arg review_state "$REVIEW_STATE" \
            --arg source_event_id "$SOURCE_EVENT_ID" \
            --arg actor "$ACTOR" \
            --arg trigger_event "pull_request_review" \
            '{
              title: $title,
              description: $description,
              board_id: $board_id,
              status: "inbox",
              metadata: {
                trigger_event: $trigger_event,
                pr_number: $pr_number,
                repo: $repo,
                review_url: $review_url,
                review_state: $review_state,
                source_event_id: $source_event_id,
                actor: $actor
              }
            }')

          curl --fail-with-body --connect-timeout 10 --max-time 30 -X POST "$MC_BASE_URL/api/v1/boards/$MC_BOARD_ID/tasks" \
            -H "Authorization: Bearer $MC_TOKEN" \
            -H "Content-Type: application/json" \
            -d "$PAYLOAD"

          echo "Task created for PR #$PR_NUMBER (pull_request_review trigger)"
