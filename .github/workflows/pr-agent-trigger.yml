name: Agent PR Fix Trigger

on:
  issue_comment:
    types: [created]

permissions:
  contents: read
  issues: read
  pull-requests: read

jobs:
  trigger-agent:
    if: >-
      github.event.issue.pull_request != null &&
      github.event.repository.private == true &&
      contains(github.event.comment.body, '@jleechanclaw') &&
      contains(fromJson('["OWNER","MEMBER","COLLABORATOR"]'), github.event.comment.author_association)
    runs-on: self-hosted
    steps:
      - name: Create Mission Control task
        env:
          MC_BASE_URL: ${{ vars.MISSION_CONTROL_BASE_URL }}
          MC_TOKEN: ${{ secrets.MISSION_CONTROL_TOKEN }}
          MC_BOARD_ID: ${{ vars.MISSION_CONTROL_BOARD_ID }}
          COMMENT_BODY: ${{ github.event.comment.body }}
          PR_NUMBER: ${{ github.event.issue.number }}
          REPO: ${{ github.repository }}
          COMMENT_URL: ${{ github.event.comment.html_url }}
          ACTOR: ${{ github.actor }}
        run: |
          set -euo pipefail

          # Extract instruction after mention.
          INSTRUCTION="$(printf '%s' "$COMMENT_BODY" | sed 's/@jleechanclaw//g')"
          INSTRUCTION="$(printf '%s' "$INSTRUCTION" | sed -E 's/^[[:space:]]+//; s/[[:space:]]+$//')"
          if [ -z "$INSTRUCTION" ]; then
            echo "No instruction text after mention; nothing to enqueue."
            exit 0
          fi

          PAYLOAD="$(jq -n \
            --arg title "PR Fix: $REPO #$PR_NUMBER" \
            --arg description "$INSTRUCTION" \
            --arg pr_number "$PR_NUMBER" \
            --arg repo "$REPO" \
            --arg comment_url "$COMMENT_URL" \
            --arg actor "$ACTOR" \
            '{title: $title, description: $description, status: "inbox", metadata: {pr_number: $pr_number, repo: $repo, comment_url: $comment_url, actor: $actor}}')"

          # Create task via Mission Control API.
          curl -fsS --connect-timeout 5 --max-time 20 --retry 2 --retry-all-errors \
            -X POST "$MC_BASE_URL/api/v1/boards/$MC_BOARD_ID/tasks" \
            -H "Authorization: Bearer $MC_TOKEN" \
            -H "Content-Type: application/json" \
            -d "$PAYLOAD"

          echo "✅ Task created for PR #$PR_NUMBER"
